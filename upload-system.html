<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced File Upload System</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        #drop-area { border: 2px dashed #ccc; border-radius: 20px; padding: 20px; text-align: center; }
        #fileElem { display: none; }
    </style>
</head>
<body>
    <h1>Advanced File Upload System</h1>
    <div id="drop-area">
        <h3>Drag & Drop files here</h3>
        <input type="file" id="fileElem" multiple accept="*/*">
        <label for="fileElem">or click to select files</label>
    </div>
    <ul id="fileList"></ul>
    <script>
        const dropArea = document.getElementById('drop-area');
        const fileList = document.getElementById('fileList');

        dropArea.addEventListener('dragover', e => {
            e.preventDefault();
            dropArea.classList.add('highlight');
        });

        dropArea.addEventListener('dragleave', () => {
            dropArea.classList.remove('highlight');
        });

        dropArea.addEventListener('drop', e => {
            e.preventDefault();
            dropArea.classList.remove('highlight');
            const files = e.dataTransfer.files;
            handleFiles(files);
        });

        function handleFiles(files) {
            for (let i = 0; i < files.length; i++) {
                const file = files[i];
                const listItem = document.createElement('li');
                listItem.textContent = `${file.name} (${(file.size / 1024).toFixed(2)} KB)`;
                fileList.appendChild(listItem);
                uploadFile(file);
            }
        }

        function uploadFile(file) {
            const xhr = new XMLHttpRequest();
            const url = '/upload'; // Update with your server upload URL
            const formData = new FormData();
            formData.append('file', file);

            xhr.upload.addEventListener('progress', e => {
                if (e.lengthComputable) {
                    const percentComplete = (e.loaded / e.total) * 100;
                    // Update progress bar or similar here
                    console.log(`Upload progress: ${percentComplete.toFixed(2)}%`);
                }
            });

            xhr.open('POST', url);
            xhr.send(formData);
        }
    </script>
</body>
</html>
